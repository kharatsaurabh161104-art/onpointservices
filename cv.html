<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Caste Validity Document Generator</title>

<link rel="icon" type="image/png" href="logo.jpeg">

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'Segoe UI',Arial,sans-serif;
  background:#f5f7fb;
  display:flex;
  justify-content:center;
  padding:30px 10px 80px;
}

/* Container */
.container{
  width:100%;
  max-width:800px;
  background:#ffffff;
  border-radius:14px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
  overflow:hidden;
}

/* Header */
.header{
  text-align:center;
  padding:20px;
  border-bottom:1px solid #eee;
}
.header h1{
  color:#0d47a1;
  font-size:22px;
}
.header p{
  font-size:13px;
  color:#666;
}

/* Body */
.body{
  padding:25px;
}

/* Cards */
.cards{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:18px;
}

.card{
  border:1px solid #e6e6e6;
  border-radius:12px;
  padding:20px;
  text-decoration:none;
  background:#fff;
  transition:0.2s;
}
.card:hover{
  box-shadow:0 6px 20px rgba(0,0,0,0.08);
  transform:translateY(-3px);
}

.icon{
  font-size:28px;
  margin-bottom:10px;
}

.card h3{
  color:#0d47a1;
  font-size:16px;
  margin-bottom:6px;
}

.card p{
  font-size:13px;
  color:#555;
  margin-bottom:10px;
}

.btn{
  display:inline-block;
  background:#0d47a1;
  color:#fff;
  padding:7px 15px;
  border-radius:6px;
  font-size:13px;
}

.btn:hover{
  background:#08306b;
}

/* Footer */
footer{
  position:fixed;
  bottom:0;
  width:100%;
  background:#0d47a1;
  color:#fff;
  text-align:center;
  padding:8px;
  font-size:13px;
}

/* Mobile */
@media(max-width:600px){
  .cards{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <h1>Onpoint Services</h1>
    <p>Caste Validity Document Generator</p>
  </div>

  <div class="body">

    <div class="cards">

      <!-- Form 3 -->
      <a class="card" href="Form3.html">
        <div class="icon">📄</div>
        <h3>Form 3</h3>
        <p>Generate caste scrutiny affidavit</p>
        <span class="btn">Open</span>
      </a>

      <!-- Family Tree -->
      <a class="card" href="tree.html">
        <div class="icon">🌳</div>
        <h3>Family Tree Diagram</h3>
        <p>Create and print family tree</p>
        <span class="btn">Open</span>
      </a>

      <!-- Form 17 -->
      <a class="card" href="Form17.html">
        <div class="icon">📑</div>
        <h3>Form 17</h3>
        <p>Generate caste validity Form 17</p>
        <span class="btn">Open</span>
      </a>

    </div>

  </div>

</div>

<footer>
Onpoint Services • Developed by Saurabh Ajinath Kharat • © 2026
</footer>

</body>
</html>
